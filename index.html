<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>jznauxiliogrudante</title>
    <!-- Configurações para iPhone (Web App) -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="JZN Auxilio">
    
    <style>
        :root {
            --neon-blue: #00f2ff;
            --dark-bg: rgba(10, 10, 20, 0.98);
            --glow: 0 0 15px rgba(0, 242, 255, 0.5);
        }

        body { 
            margin: 0; 
            padding: 0; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background: #050505; 
            overflow: hidden;
            height: 100vh;
        }

        /* TELA DE LOGIN */
        #loginScreen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #0a0a14;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: 0.5s;
        }

        .login-box {
            background: var(--dark-bg);
            padding: 30px;
            border: 1px solid var(--neon-blue);
            border-radius: 20px;
            box-shadow: var(--glow);
            text-align: center;
        }

        .login-box h1 { color: var(--neon-blue); font-size: 18px; margin-bottom: 20px; letter-spacing: 3px; }

        input[type=password] {
            background: #1a1a2e;
            border: 1px solid #333;
            color: white;
            padding: 12px;
            border-radius: 8px;
            width: 200px;
            outline: none;
            text-align: center;
        }

        input[type=password]:focus { border-color: var(--neon-blue); }

        .btn-login {
            margin-top: 20px;
            background: var(--neon-blue);
            color: black;
            border: none;
            padding: 10px 40px;
            border-radius: 8px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
        }

        /* MENU FLUTUANTE */
        #jznauxiliogrudante {
            width: 260px;
            background: var(--dark-bg);
            border: 1px solid var(--neon-blue);
            border-radius: 15px;
            padding: 15px;
            color: white;
            position: absolute;
            top: 50px;
            left: 20px;
            box-shadow: var(--glow);
            display: none; /* Escondido até logar */
            user-select: none;
            touch-action: none;
        }

        .header {
            text-align: center;
            font-size: 14px;
            color: var(--neon-blue);
            font-weight: bold;
            margin-bottom: 15px;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
            cursor: move;
        }

        .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .row span { font-size: 13px; color: #eee; }

        /* Sliders */
        input[type=range] { -webkit-appearance: none; width: 100px; background: #333; height: 4px; border-radius: 5px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 14px; width: 14px; border-radius: 50%; background: var(--neon-blue); box-shadow: var(--glow); }

        /* Switches */
        .switch { position: relative; width: 34px; height: 18px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #333; transition: .4s; border-radius: 34px; }
        input:checked + .slider { background: var(--neon-blue); }
        .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 3px; bottom: 3px; background: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider:before { transform: translateX(16px); }

        .esp-val { font-size: 10px; color: var(--neon-blue); margin-left: 5px; }
    </style>
</head>
<body>

<!-- TELA DE LOGIN -->
<div id="loginScreen">
    <div class="login-box">
        <h1>ACCESS KEY</h1>
        <input type="password" id="passInput" placeholder="DIGITE A CHAVE">
        <br>
        <button class="btn-login" onclick="checkLogin()">Entrar</button>
    </div>
</div>

<!-- MENU FLUTUANTE -->
<div id="jznauxiliogrudante">
    <div class="header">JZNAUXILIOGRUDANTE</div>

    <div class="row">
        <span>Aimbot</span>
        <label class="switch"><input type="checkbox"><span class="slider"></span></label>
    </div>

    <div class="row">
        <span>ESP Range <span id="espNum" class="esp-val">50</span></span>
        <input type="range" min="0" max="100" value="50" oninput="document.getElementById('espNum').innerText = this.value">
    </div>

    <div class="row">
        <span>Norecoil</span>
        <label class="switch"><input type="checkbox" checked><span class="slider"></span></label>
    </div>

    <div class="row">
        <span>Aimlok</span>
        <label class="switch"><input type="checkbox"><span class="slider"></span></label>
    </div>

    <div class="row">
        <span>Antena 100%</span>
        <label class="switch"><input type="checkbox"><span class="slider"></span></label>
    </div>

    <div class="row">
        <span>Headshot Auto</span>
        <label class="switch"><input type="checkbox"><span class="slider"></span></label>
    </div>

    <div class="row">
        <span>Speed Hack</span>
        <label class="switch"><input type="checkbox"><span class="slider"></span></label>
    </div>
</div>

<script>
    // FUNÇÃO DE LOGIN
    function checkLogin() {
        const pass = document.getElementById('passInput').value;
        // A SUA CHAVE É: admin
        if(pass === "admin") { 
            document.getElementById('loginScreen').style.opacity = "0";
            setTimeout(() => {
                document.getElementById('loginScreen').style.display = "none";
                document.getElementById('jznauxiliogrudante').style.display = "block";
            }, 500);
        } else {
            alert("CHAVE INCORRETA!");
        }
    }

    // SISTEMA ARRASTÁVEL (TOUCH PARA IPHONE)
    const menu = document.getElementById("jznauxiliogrudante");
    let active = false;
    let currentX;
    let currentY;
    let initialX;
    let initialY;
    let xOffset = 0;
    let yOffset = 0;

    menu.addEventListener("touchstart", dragStart, false);
    menu.addEventListener("touchend", dragEnd, false);
    menu.addEventListener("touchmove", drag, false);

    function dragStart(e) {
        initialX = e.touches[0].clientX - xOffset;
        initialY = e.touches[0].clientY - yOffset;
        if (e.target === menu || e.target.classList.contains('header')) {
            active = true;
        }
    }

    function dragEnd(e) {
        initialX = currentX;
        initialY = currentY;
        active = false;
    }

    function drag(e) {
        if (active) {
            e.preventDefault();
            currentX = e.touches[0].clientX - initialX;
            currentY = e.touches[0].clientY - initialY;
            xOffset = currentX;
            yOffset = currentY;
            setTranslate(currentX, currentY, menu);
        }
    }

    function setTranslate(xPos, yPos, el) {
        el.style.transform = "translate3d(" + xPos + "px, " + yPos + "px, 0)";
    }
</script>

</body>
</html>
