<!-- Tela de Login Futurista -->
<div id="loginScreen" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#0a0a14; z-index:10000; display:flex; flex-direction:column; align-items:center; justify-content:center;">
    <h1 style="color:#00f2ff; font-size:20px; margin-bottom:20px;">ACESSO RESTRITO</h1>
    <input type="password" id="passInput" placeholder="Digite sua Chave" style="background:#222; border:1px solid #00f2ff; color:white; padding:10px; border-radius:5px; text-align:center;">
    <button onclick="checkLogin()" style="margin-top:15px; padding:10px 30px; background:#00f2ff; border:none; border-radius:5px; font-weight:bold; cursor:pointer;">ENTRAR</button>
</div>

<script>
function checkLogin() {
    const pass = document.getElementById('passInput').value;
    if(pass === "admin") { // Altere "admin" pela sua senha
        document.getElementById('loginScreen').style.display = 'none';
    } else {
        alert("Chave Inválida!");
    }
}
</script>

<link rel="apple-touch-icon" href="https://seu-<!DOCTYPE html>
<html>
<head>
<style>
    :root {
        --neon-blue: #00f2ff;
        --dark-bg: rgba(10, 10, 20, 0.95);
    }
    body { font-family: 'Segoe UI', sans-serif; background: #111; }
    
    /* Container Principal Futurista */
    #jznauxiliogrudante {
        width: 250px;
        background: var(--dark-bg);
        border: 2px solid var(--neon-blue);
        border-radius: 15px;
        padding: 15px;
        color: white;
        position: fixed;
        top: 20%;
        left: 50px;
        box-shadow: 0 0 20px var(--neon-blue);
        cursor: move;
        z-index: 9999;
    }

    h2 { font-size: 14px; text-align: center; color: var(--neon-blue); text-transform: uppercase; margin-bottom: 15px; letter-spacing: 2px; }

    .function-row { margin-bottom: 12px; display: flex; flex-direction: column; }
    
    label { font-size: 11px; margin-bottom: 5px; color: #aaa; }

    /* Estilo dos Sliders */
    input[type=range] {
        -webkit-appearance: none;
        width: 100%;
        background: #222;
        height: 4px;
        border-radius: 5px;
    }
    input[type=range]::-webkit-slider-thumb {
        -webkit-appearance: none;
        height: 14px;
        width: 14px;
        border-radius: 50%;
        background: var(--neon-blue);
        cursor: pointer;
        box-shadow: 0 0 5px var(--neon-blue);
    }

    /* Estilo dos Switches */
    .switch {
        position: relative;
        display: inline-block;
        width: 34px;
        height: 18px;
    }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
        position: absolute; cursor: pointer;
        top: 0; left: 0; right: 0; bottom: 0;
        background-color: #333;
        transition: .4s; border-radius: 34px;
    }
    input:checked + .slider { background-color: var(--neon-blue); }

    .flex-row { display: flex; justify-content: space-between; align-items: center; }
</style>
</head>
<body>

<div id="jznauxiliogrudante">
    <h2>jznauxiliogrudante</h2>

    <div class="function-row">
        <div class="flex-row"><span>Aimbot</span><label class="switch"><input type="checkbox"><span class="slider"></span></label></div>
    </div>

    <div class="function-row">
        <label>ESP Range: <span id="espVal">50</span></label>
        <input type="range" min="0" max="100" value="50" oninput="document.getElementById('espVal').innerText = this.value">
    </div>

    <div class="function-row">
        <div class="flex-row"><span>NoRecoil</span><label class="switch"><input type="checkbox" checked><span class="slider"></span></label></div>
    </div>

    <div class="function-row">
        <div class="flex-row"><span>AimLock</span><label class="switch"><input type="checkbox"><span class="slider"></span></label></div>
    </div>

    <div class="function-row">
        <div class="flex-row"><span>Antena View</span><label class="switch"><input type="checkbox"><span class="slider"></span></label></div>
    </div>

    <div class="function-row">
        <div class="flex-row"><span>Auto Headshot</span><label class="switch"><input type="checkbox"><span class="slider"></span></label></div>
    </div>

    <div class="function-row">
        <div class="flex-row"><span>Fast Reload</span><label class="switch"><input type="checkbox"><span class="slider"></span></label></div>
    </div>
</div>

<script>
    // Sistema para arrastar o menu na tela
    const menu = document.getElementById("jznauxiliogrudante");
    let isDragging = false;
    let offsetX, offsetY;

    menu.addEventListener("mousedown", (e) => {
        isDragging = true;
        offsetX = e.clientX - menu.offsetLeft;
        offsetY = e.clientY - menu.offsetTop;
    });

    document.addEventListener("mousemove", (e) => {
        if (isDragging) {
            menu.style.left = (e.clientX - offsetX) + "px";
            menu.style.top = (e.clientY - offsetY) + "px";
        }
    });

    document.addEventListener("mouseup", () => { isDragging = false; });
</script>

</body>
</html>
